{% load static %}
<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coach</title>
    <link rel="stylesheet" href="{% static 'chat/css/style.css' %}">
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">AI Coach</div>
        <div class="chat-messages" id="chat-log">
            <div class="message agent-message">Привіт! Я твій AI Коуч. Як пройшов день?</div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="chat-message-input" class="chat-input" placeholder="Напишіть повідомлення..."
                autocomplete="off">
            <button id="chat-message-submit" class="send-button">Відправити</button>
        </div>
    </div>

    <script src="{% static 'chat/js/chat.js' %}"></script>
</body>

</html>
